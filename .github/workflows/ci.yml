name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x", "stable"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -trimpath ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (echo "gofmt needed on:"; gofmt -l .; exit 1)

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        if: matrix.go-version == 'stable'
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --verbose upload-process \
            --fail-on-error \
            -t ${{ secrets.CODECOV_TOKEN }} \
            -n "ci-${{ github.run_id }}" \
            -F unittests \
            -f coverage.out \
            --git-service github

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -trimpath ./...

      - name: Build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -trimpath ./...

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -trimpath ./...

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -trimpath ./...

      - name: Build windows/amd64
        run: GOOS=windows GOARCH=amd64 go build -trimpath ./...

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Smoke tests
        run: go test -tags smoke -v ./test/smoke/...

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Integration tests
        run: go test -tags integration -v -timeout 120s ./test/integration/...
