version: 2

builds:
  - main: .
    binary: wolfcastle
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/dorkusprime/wolfcastle/cmd.Version={{.Version}}
      - -X github.com/dorkusprime/wolfcastle/cmd.Commit={{.ShortCommit}}
      - -X github.com/dorkusprime/wolfcastle/cmd.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: dorkusprime
    name: wolfcastle
  prerelease: auto

brews:
  - name: wolfcastle
    repository:
      owner: dorkusprime
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/dorkusprime/wolfcastle"
    description: "Wolfcastle takes complex work, breaks it into pieces, and sends AI models to destroy every one of them"
    license: "MIT"
    skip_upload: false
    install: |
      bin.install "wolfcastle"
    test: |
      system "#{bin}/wolfcastle", "version"
    commit_msg_template: "Update wolfcastle to {{ .Tag }}"
